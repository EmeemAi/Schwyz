<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SCHWYZ | Soluciones Integrales</title>
    
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX transpilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS ESTÁNDAR: Se aplica instantáneamente antes que cualquier script -->
    <style>
        /* Oculta scripts y estilos para que no se vean como texto */
        script, style { display: none !important; }
        /* Mantiene la pantalla en el color de fondo oficial mientras carga */
        body { 
            background-color: #002654 !important; 
            margin: 0;
            opacity: 0;
        }
        /* Clase que activa React al terminar de cargar */
        body.loaded { 
            opacity: 1; 
            transition: opacity 0.4s ease-in; 
        }
    </style>

    <script>
        // Tailwind Configuration
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        schwyz: {
                            blue: '#002654',
                            dark: '#001a3d',
                            yellow: '#FFC700',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                        'fade-in-up': 'fadeInUp 0.6s ease-out forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply font-sans text-white antialiased;
            }
        }
        @layer components {
            .bg-grid-pattern {
                background-size: 40px 40px;
                background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                                  linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- HELPER COMPONENTS ---

        const Icon = ({ name, className = "", size = 20 }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current) {
                    lucide.createIcons({
                        attrs: {
                            class: className,
                            'stroke-width': 2,
                            width: size,
                            height: size
                        },
                        name: name,
                        element: iconRef.current
                    });
                }
            }, [name, className, size]);
            return <i ref={iconRef} data-lucide={name} className={className}></i>;
        };

        const Logo = ({ className = '', size = 'lg' }) => {
            const sizes = {
                sm: 'h-14',
                md: 'h-24',
                lg: 'h-36',
            };

            return (
                <div className={`flex items-center justify-center select-none ${className}`}>
                    <img 
                        src="logo.png" 
                        alt="SCHWYZ Logo" 
                        className={`${sizes[size]} w-auto object-contain`}
                        referrerPolicy="no-referrer"
                        onError={(e) => {
                            e.currentTarget.style.display = 'none';
                            e.currentTarget.parentElement.innerHTML = '<span class="text-white font-extrabold tracking-tight text-5xl">SCHWYZ</span>';
                        }}
                    />
                </div>
            );
        };

        const ActionButton = ({ label, subLabel, iconName, href, variant = 'primary', onClick }) => {
            const baseStyles = "group w-full flex items-center justify-between px-6 py-4 rounded-xl transition-all duration-300 transform border backdrop-blur-sm relative overflow-hidden cursor-pointer no-underline";
            
            const variants = {
                primary: "bg-gradient-to-br from-white to-gray-100 border-white/50 text-[#002654] hover:shadow-lg hover:shadow-white/10 hover:-translate-y-1",
                cta: "bg-white border-[#FFC700]/30 text-[#002654] hover:shadow-lg hover:shadow-white/10 hover:-translate-y-1 hover:border-[#FFC700]/60",
                secondary: "bg-white/5 border-white/20 text-white hover:bg-white/10 hover:border-white/40 hover:-translate-y-1",
                whatsapp: "bg-gradient-to-r from-[#25D366] to-[#128C7E] border-transparent text-white hover:shadow-lg hover:shadow-green-500/20 hover:-translate-y-1",
            };

            return (
                <a 
                    href={href} 
                    target={href === '#' ? undefined : "_blank"} 
                    rel={href === '#' ? undefined : "noopener noreferrer"}
                    className={`${baseStyles} ${variants[variant]}`}
                    onClick={onClick}
                >
                    <div className="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-500 ease-out pointer-events-none"></div>

                    <div className="flex items-center gap-4 relative z-10 flex-1">
                        {iconName && (
                            <div className={`p-2 rounded-lg shrink-0 ${variant === 'primary' || variant === 'cta' ? 'bg-[#002654]/10' : 'bg-white/20'} flex items-center justify-center`}>
                                <Icon name={iconName} className="w-5 h-5" />
                            </div>
                        )}
                        <div className="flex flex-col items-start text-left">
                            <span className="font-bold text-base sm:text-lg leading-tight">{label}</span>
                            {subLabel && (
                                <span className={`text-xs mt-0.5 font-medium ${variant === 'primary' || variant === 'cta' ? 'text-[#002654]/70' : 'text-white/80'}`}>
                                    {subLabel}
                                </span>
                            )}
                        </div>
                    </div>
                    <div className={`transition-transform group-hover:translate-x-1 shrink-0 ${variant === 'primary' || variant === 'cta' ? 'text-[#002654]' : 'text-white/80'}`}>
                        <Icon name="chevron-right" className="w-5 h-5" />
                    </div>
                </a>
            );
        };

        const FormInput = ({ iconName, label, id, ...props }) => (
            <div className="space-y-1.5 group">
                <label htmlFor={id} className="text-xs font-semibold text-gray-300 ml-1 uppercase tracking-wide">{label}</label>
                <div className="relative">
                    <div className="absolute left-3 top-1/2 -translate-y-1/2 text-[#FFC700]/70 group-focus-within:text-[#FFC700] transition-colors flex items-center">
                        <Icon name={iconName} className="w-5 h-5" />
                    </div>
                    <input 
                        id={id}
                        {...props}
                        className="w-full bg-black/20 border border-white/10 rounded-xl pl-10 pr-4 py-3.5 text-white placeholder-white/20 focus:outline-none focus:border-[#FFC700]/50 focus:bg-black/30 focus:ring-1 focus:ring-[#FFC700]/50 transition-all shadow-inner"
                    />
                </div>
            </div>
        );

        // --- MAIN APP ---

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsL9Ex0x3RtkJ4DSu0iSNtPSXm_Vlrtyf0FfA5fGtPfjG6y4b3SLIrnhGjxI0niaAS/exec";

        function App() {
            const [currentView, setCurrentView] = useState('menu');
            const [isLoading, setIsLoading] = useState(false);
            const [formData, setFormData] = useState({
                empresa: '',
                contacto: '',
                email: '',
                codigo: '' // Volvemos al nombre simple para asegurar compatibilidad
            });

            useEffect(() => {
                document.body.classList.add('loaded');
            }, []);

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsLoading(true);

                // Usamos URLSearchParams: es el método más fiable para Google Apps Script
                const params = new URLSearchParams();
                params.append('empresa', formData.empresa);
                params.append('contacto', formData.contacto);
                params.append('email', formData.email);
                params.append('codigo', formData.codigo);

                try {
                    await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Google Script requiere no-cors
                        body: params
                    });
                    setCurrentView('success');
                } catch (error) {
                    console.error("Error de envío:", error);
                    alert("Hubo un error al enviar. Por favor, intenta contactarnos por WhatsApp.");
                } finally {
                    setIsLoading(false);
                }
            };

            const resetApp = () => {
                setFormData({ empresa: '', contacto: '', email: '', codigo: '' });
                setCurrentView('menu');
            };

            return (
                <main className="min-h-screen bg-gradient-to-br from-[#002654] via-[#001a3d] to-black flex flex-col items-center justify-center p-4 relative overflow-hidden">
                    
                    <div className="absolute inset-0 bg-grid-pattern opacity-30 pointer-events-none"></div>
                    
                    <div className="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
                        <div className="absolute -top-[10%] -left-[10%] w-[500px] h-[500px] bg-[#002654] rounded-full blur-[100px] opacity-60 mix-blend-screen animate-pulse-slow"></div>
                        <div className="absolute top-[40%] right-[-10%] w-[300px] h-[300px] bg-[#FFC700] rounded-full blur-[120px] opacity-10"></div>
                    </div>

                    <div className="z-10 w-full max-w-lg animate-fade-in-up">
                        
                        <div className="bg-white/5 backdrop-blur-xl border border-white/10 shadow-2xl rounded-3xl p-6 sm:p-8 relative overflow-hidden">
                            
                            <div className="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>

                            <header className={`flex flex-col items-center gap-0 text-center transition-all duration-500 ${currentView === 'menu' ? 'mb-8' : 'mb-6'}`}>
                                <Logo size={currentView === 'menu' ? 'lg' : 'md'} />
                                <div className="h-px w-12 bg-[#FFC700]/50 mt-0 mb-1"></div>
                                <p className="text-gray-300 text-xs sm:text-sm tracking-[0.3em] uppercase font-medium opacity-80">
                                    Soluciones Integrales
                                </p>
                            </header>

                            {currentView === 'menu' && (
                                <nav className="flex flex-col gap-6 animate-fade-in">
                                    <div className="text-center space-y-2">
                                        <h2 className="text-xl font-bold text-white tracking-tight">Solicitud de Certificado</h2>
                                        <p className="text-gray-400 text-sm px-4 leading-relaxed">
                                            Completa el formulario para recibir tu certificado oficial.
                                        </p>
                                    </div>

                                    <ActionButton 
                                        label="Solicitar certificado"
                                        subLabel="Obtén el documento de tu equipo"
                                        href="#"
                                        onClick={(e) => { e.preventDefault(); setCurrentView('form'); }}
                                        iconName="file-text"
                                        variant="cta"
                                    />
                                    
                                    <div className="flex flex-col items-center pt-4 border-t border-white/5">
                                        <a 
                                            href="https://schwyz.com.ar/" 
                                            target="_blank" 
                                            rel="noopener noreferrer"
                                            className="group flex items-center gap-2 text-white/40 hover:text-white transition-all duration-300 text-sm"
                                        >
                                            <Icon name="external-link" size={14} className="opacity-50 group-hover:opacity-100 group-hover:scale-110 transition-all" />
                                            <span className="font-medium">Visitar sitio web oficial</span>
                                        </a>
                                    </div>
                                </nav>
                            )}

                            {currentView === 'form' && (
                                <div className="animate-fade-in">
                                    <div className="flex items-center mb-6 relative">
                                        <button 
                                            onClick={() => setCurrentView('menu')} 
                                            className="absolute left-0 p-2 -ml-2 text-white/60 hover:text-[#FFC700] hover:bg-white/5 rounded-full transition-all flex items-center justify-center"
                                        >
                                            <Icon name="arrow-left" className="w-5 h-5" />
                                        </button>
                                        <h2 className="w-full text-center text-lg font-bold text-white tracking-wide">Nuevo Certificado</h2>
                                    </div>

                                    <form id="request-form" onSubmit={handleSubmit} className="space-y-4" autoComplete="off">
                                        <FormInput 
                                            id="input-empresa"
                                            iconName="building-2"
                                            label="Empresa"
                                            name="empresa"
                                            autoComplete="nope"
                                            value={formData.empresa}
                                            onChange={handleInputChange}
                                            placeholder="Nombre de la empresa"
                                        />

                                        <FormInput 
                                            id="input-contacto"
                                            iconName="user"
                                            label="Nombre de contacto"
                                            name="contacto"
                                            autoComplete="nope"
                                            required
                                            value={formData.contacto}
                                            onChange={handleInputChange}
                                            placeholder="Su nombre completo"
                                        />

                                        <FormInput 
                                            id="input-email"
                                            iconName="mail"
                                            label="Correo electrónico"
                                            type="email"
                                            name="email"
                                            autoComplete="nope"
                                            required
                                            value={formData.email}
                                            onChange={handleInputChange}
                                            placeholder="email@empresa.com"
                                        />

                                        <div className="pt-2">
                                            <div className="relative group p-1 bg-gradient-to-r from-[#FFC700]/20 via-white/5 to-[#FFC700]/20 rounded-2xl">
                                                <div className="bg-[#0a1e36] rounded-xl p-4 border border-[#FFC700]/20">
                                                    <label htmlFor="input-tag-id" className="text-xs font-semibold text-[#FFC700] mb-2 block uppercase tracking-wide flex items-center gap-2">
                                                        <Icon name="qr-code" className="w-4 h-4" /> Código de etiqueta
                                                    </label>
                                                    <input 
                                                        id="input-tag-id"
                                                        type="text" 
                                                        name="codigo"
                                                        autoComplete="new-password"
                                                        required
                                                        pattern="[a-zA-Z0-9]{6}-[a-zA-Z0-9]{2}-[a-zA-Z0-9]{4,6}"
                                                        title="El formato debe ser XXXXXX-XX-XXXXX (Ej: 202603-CA-11111)"
                                                        value={formData.codigo}
                                                        onChange={handleInputChange}
                                                        className="w-full bg-black/30 border border-white/10 rounded-lg px-4 py-3 text-white text-lg font-mono tracking-wider placeholder-white/20 focus:outline-none focus:border-[#FFC700] focus:ring-1 focus:ring-[#FFC700] transition-all text-center invalid:border-red-500/50 invalid:text-red-200"
                                                        placeholder="202603-CA-11111"
                                                    />
                                                    <div className="mt-3 flex gap-3 items-start bg-[#FFC700]/5 p-2 rounded border border-[#FFC700]/10">
                                                        <span className="text-lg">📌</span>
                                                        <p className="text-xs text-gray-400 leading-relaxed">
                                                            Busca este código en la etiqueta pegada al instrumento.<br/>
                                                            <span className="text-[#FFC700]/80">Formato: 202603-CA-11111</span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>

                                        <button 
                                            type="submit" 
                                            disabled={isLoading}
                                            className="w-full mt-4 bg-[#FFC700] text-[#002654] font-bold py-4 rounded-xl hover:bg-[#ffdb4d] hover:shadow-[0_0_20px_rgba(255,199,0,0.3)] transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 disabled:opacity-70 disabled:cursor-not-allowed group"
                                        >
                                            {isLoading ? (
                                                <>
                                                    <Icon name="loader-2" className="w-5 h-5 animate-spin" />
                                                    Procesando...
                                                </>
                                            ) : (
                                                <>
                                                    <Icon name="send" className="w-5 h-5 group-hover:-translate-y-0.5 group-hover:translate-x-0.5 transition-transform" />
                                                    Enviar Solicitud
                                                </>
                                            )}
                                        </button>
                                    </form>
                                </div>
                            )}

                            {currentView === 'success' && (
                                <div className="text-center animate-fade-in py-8">
                                    <div className="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(34,197,94,0.4)] animate-bounce">
                                        <Icon name="check-circle" className="w-12 h-12 text-white" />
                                    </div>
                                    <h2 className="text-2xl font-bold mb-3 text-white">¡Solicitud Enviada!</h2>
                                    <p className="text-gray-300 mb-8 max-w-xs mx-auto text-sm leading-relaxed">
                                        Hemos recibido tu información. El certificado será enviado a tu correo electrónico en las próximas 24 horas.
                                    </p>
                                    <button 
                                        onClick={resetApp}
                                        className="px-8 py-3 bg-white/10 border border-white/20 text-white font-semibold rounded-full hover:bg-white hover:text-[#002654] transition-all"
                                    >
                                        Volver al inicio
                                    </button>
                                </div>
                            )}

                            <div className="mt-8 pt-6 border-t border-white/10 text-center">
                                <div className="inline-flex items-center gap-2 px-3 py-1.5 bg-white/5 rounded-full border border-white/5 mb-3">
                                    <Icon name="help-circle" className="w-3.5 h-3.5 text-[#FFC700]" />
                                    <span className="text-[10px] font-bold uppercase tracking-wider text-gray-400">¿Necesitas ayuda?</span>
                                </div>
                                <p className="text-xs text-gray-300 leading-relaxed max-w-[280px] mx-auto">
                                    Por cualquier consulta con respecto al certificado, escríbanos a:
                                    <a 
                                        href="mailto:dario.delreal@todomedicion.com" 
                                        className="block mt-1 text-[#FFC700] hover:text-[#ffdb4d] transition-colors font-semibold underline underline-offset-4 decoration-[#FFC700]/30"
                                    >
                                        dario.delreal@todomedicion.com
                                    </a>
                                </p>
                            </div>

                        </div>

                        {currentView !== 'form' && (
                            <footer className="mt-8 text-center">
                                <p className="text-white/30 text-[10px] uppercase tracking-widest hover:text-white/50 transition-colors cursor-default">
                                    © {new Date().getFullYear()} SCHWYZ Importaciones
                                </p>
                            </footer>
                        )}
                    </div>
                </main>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
